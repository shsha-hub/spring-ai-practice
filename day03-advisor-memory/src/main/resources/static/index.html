<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>긴 대화 자동 요약기 데모</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Inter:wght@400;500;600;700&display=swap');

  :root {
    --bg: #f6f5f2;
    --ink: #23252b;
    --sub: #6b6f7a;
    --line: #e4e1da;
    --accent: #5b8def;
    --accent-soft: #eaf1fe;
    --user-bg: #23252b;
    --user-fg: #ffffff;
    --assistant-bg: #ffffff;
    --summary-bg: #fff7e6;
    --summary-border: #e8b64c;
    --system-fg: #92650f;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: 'Inter', -apple-system, sans-serif;
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  header {
    padding: 18px 24px;
    border-bottom: 1px solid var(--line);
    background: #fff;
    display: flex;
    align-items: center;
    gap: 20px;
    flex-wrap: wrap;
  }

  header h1 {
    font-size: 16px;
    font-weight: 700;
    margin: 0;
    white-space: nowrap;
  }

  header .eyebrow {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10.5px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--accent);
    font-weight: 600;
    display: block;
    margin-bottom: 2px;
  }

  .field {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .field label {
    font-size: 12px;
    color: var(--sub);
    white-space: nowrap;
  }

  .field input {
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 7px 10px;
    font-size: 13px;
    font-family: 'JetBrains Mono', monospace;
    width: 160px;
  }

  button {
    border: none;
    border-radius: 8px;
    padding: 8px 14px;
    font-size: 13px;
    cursor: pointer;
    font-weight: 600;
    font-family: 'Inter', sans-serif;
  }

  .btn-primary { background: var(--ink); color: #fff; }
  .btn-ghost { background: #f2f1ed; color: var(--ink); }
  .btn-danger { background: #fdeceb; color: #c0392b; }
  button:disabled { opacity: 0.5; cursor: not-allowed; }

  .stat {
    margin-left: auto;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--sub);
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .stat b { color: var(--ink); font-size: 13px; }

  .layout {
    flex: 1;
    display: grid;
    grid-template-columns: 1.3fr 1fr;
    overflow: hidden;
    min-height: 0;
  }

  /* ---- 왼쪽: 채팅 ---- */
  .chat-col {
    display: flex;
    flex-direction: column;
    border-right: 1px solid var(--line);
    min-width: 0;
    min-height: 0;
  }

  .chat-messages {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    min-height: 0;
  }

  .bubble-row { display: flex; }
  .bubble-row.user { justify-content: flex-end; }
  .bubble-row.assistant { justify-content: flex-start; }

  .bubble {
    max-width: 70%;
    padding: 11px 15px;
    border-radius: 14px;
    font-size: 14px;
    line-height: 1.55;
    white-space: pre-wrap;
  }

  .bubble.user { background: var(--user-bg); color: var(--user-fg); border-bottom-right-radius: 4px; }
  .bubble.assistant { background: var(--assistant-bg); border: 1px solid var(--line); border-bottom-left-radius: 4px; }

  .empty-hint {
    margin: auto;
    text-align: center;
    color: var(--sub);
    font-size: 13px;
    max-width: 320px;
    line-height: 1.6;
  }

  .composer {
    border-top: 1px solid var(--line);
    padding: 16px 20px;
    display: flex;
    gap: 10px;
    background: #fff;
  }

  .composer input {
    flex: 1;
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 11px 14px;
    font-size: 14px;
  }

  /* ---- 오른쪽: 메모리 상태 ---- */
  .memory-col {
    display: flex;
    flex-direction: column;
    min-width: 0;
    min-height: 0;
    background: #fbfaf8;
  }

  .memory-header {
    padding: 16px 20px 10px 20px;
  }

  .memory-header .eyebrow {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10.5px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--accent);
    font-weight: 600;
  }

  .memory-header h2 {
    font-size: 14px;
    margin: 4px 0 4px 0;
  }

  .memory-header p {
    font-size: 12px;
    color: var(--sub);
    margin: 0;
    line-height: 1.5;
  }

  .memory-list {
    flex: 1;
    overflow-y: auto;
    padding: 8px 20px 20px 20px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    min-height: 0;
  }

  .mem-item {
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 10px 12px;
    background: #fff;
  }

  .mem-item.summary {
    background: var(--summary-bg);
    border-color: var(--summary-border);
  }

  .mem-item .mem-type {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10.5px;
    font-weight: 600;
    letter-spacing: 0.04em;
    color: var(--sub);
    margin-bottom: 4px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .mem-item.summary .mem-type { color: var(--system-fg); }

  .mem-item .mem-text {
    font-size: 12.5px;
    line-height: 1.55;
    color: var(--ink);
    white-space: pre-wrap;
  }

  .tag {
    font-size: 9.5px;
    background: var(--summary-border);
    color: #fff;
    padding: 1px 6px;
    border-radius: 999px;
    font-weight: 700;
  }

  ::-webkit-scrollbar { width: 8px; }
  ::-webkit-scrollbar-thumb { background: #ddd9d0; border-radius: 8px; }
</style>
</head>
<body>

  <header>
    <div>
      <span class="eyebrow">Summarizing Memory</span>
      <h1>긴 대화 자동 요약기 데모</h1>
    </div>

    <div class="field">
      <label for="conversationId">conversationID</label>
      <input id="conversationId" value="summary-demo-01">
    </div>
    <button class="btn-ghost" id="loadBtn">불러오기</button>
    <button class="btn-danger" id="clearBtn">대화 초기화</button>

    <div class="stat">
      call-count: <b id="callCountValue">-</b>
    </div>
  </header>

  <div class="layout">

    <div class="chat-col">
      <div class="chat-messages" id="chatMessages">
        <div class="empty-hint" id="emptyHint">
          질문을 입력해보세요. 10턴 이상 이어가면 오른쪽 메모리 패널에서<br>
          요약 메시지(주황색 카드)가 생기는 걸 볼 수 있어요.
        </div>
      </div>
      <div class="composer">
        <input id="questionInput" placeholder="질문을 입력하세요" value="내 이름은 지훈이야. 취미는 등산이야.">
        <button class="btn-primary" id="sendBtn">보내기</button>
      </div>
    </div>

    <div class="memory-col">
      <div class="memory-header">
        <span class="eyebrow">Raw Storage</span>
        <h2>저장된 메모리 상태</h2>
        <p>ChatMemoryRepository에 실제로 남아있는 메시지 목록입니다. <span class="tag">SUMMARY</span> 카드는 오래된 대화가 압축된 결과예요.</p>
      </div>
      <div class="memory-list" id="memoryList"></div>
    </div>

  </div>

<script>
const chatMessages = document.getElementById('chatMessages');
const emptyHint = document.getElementById('emptyHint');
const memoryList = document.getElementById('memoryList');
const conversationIdInput = document.getElementById('conversationId');
const questionInput = document.getElementById('questionInput');
const sendBtn = document.getElementById('sendBtn');
const loadBtn = document.getElementById('loadBtn');
const clearBtn = document.getElementById('clearBtn');
const callCountValue = document.getElementById('callCountValue');

function addBubble(role, text) {
  emptyHint.remove();
  const row = document.createElement('div');
  row.className = `bubble-row ${role}`;
  const bubble = document.createElement('div');
  bubble.className = `bubble ${role}`;
  bubble.textContent = text;
  row.appendChild(bubble);
  chatMessages.appendChild(row);
  chatMessages.scrollTop = chatMessages.scrollHeight;
}

function renderMemory(items) {
  memoryList.innerHTML = '';
  if (!items || items.length === 0) {
    memoryList.innerHTML = '<div style="color:#9a9da6; font-size:12px; padding:8px;">아직 저장된 메시지가 없습니다.</div>';
    return;
  }
  items.forEach(item => {
    const isSummary = item.type === 'USER' && item.text && item.text.startsWith('[이전 대화 요약]');
    const div = document.createElement('div');
    div.className = 'mem-item' + (isSummary ? ' summary' : '');
    div.innerHTML = `
      <div class="mem-type">${item.type}${isSummary ? ' <span class="tag">SUMMARY</span>' : ''}</div>
      <div class="mem-text"></div>
    `;
    div.querySelector('.mem-text').textContent = item.text;
    memoryList.appendChild(div);
  });
  memoryList.scrollTop = memoryList.scrollHeight;
}

async function refreshHistory() {
  const conversationID = conversationIdInput.value.trim();
  if (!conversationID) return;
  try {
    const res = await fetch(`/api/chat-summary/history?conversationID=${encodeURIComponent(conversationID)}`);
    const data = await res.json();
    renderMemory(data);
  } catch (e) {
    memoryList.innerHTML = '<div style="color:#c0392b; font-size:12px;">불러오기 실패</div>';
  }
}

async function refreshCallCount() {
  try {
    const res = await fetch('/api/call-count');
    callCountValue.textContent = await res.text();
  } catch (e) {
    callCountValue.textContent = '-';
  }
}

async function sendMessage() {
  const question = questionInput.value.trim();
  const conversationID = conversationIdInput.value.trim();
  if (!question || !conversationID) return;

  addBubble('user', question);
  questionInput.value = '';
  sendBtn.disabled = true;
  sendBtn.textContent = '응답 중...';

  try {
    const url = `/api/chat-summary?question=${encodeURIComponent(question)}&conversationID=${encodeURIComponent(conversationID)}`;
    const res = await fetch(url);
    if (!res.ok) throw new Error('요청 실패: ' + res.status);
    const answer = await res.text();
    addBubble('assistant', answer);
    await Promise.all([refreshHistory(), refreshCallCount()]);
  } catch (e) {
    addBubble('assistant', '⚠ 오류: ' + e.message);
  } finally {
    sendBtn.disabled = false;
    sendBtn.textContent = '보내기';
  }
}

async function clearConversation() {
  const conversationID = conversationIdInput.value.trim();
  if (!conversationID) return;
  await fetch(`/api/chat-summary/clear?conversationID=${encodeURIComponent(conversationID)}`);
  chatMessages.innerHTML = '';
  const hint = document.createElement('div');
  hint.className = 'empty-hint';
  hint.textContent = '대화가 초기화되었습니다. 새 질문을 입력해보세요.';
  chatMessages.appendChild(hint);
  await refreshHistory();
}

sendBtn.addEventListener('click', sendMessage);
questionInput.addEventListener('keydown', e => { if (e.key === 'Enter') sendMessage(); });
loadBtn.addEventListener('click', refreshHistory);
clearBtn.addEventListener('click', clearConversation);

refreshHistory();
refreshCallCount();
</script>

</body>
</html>
