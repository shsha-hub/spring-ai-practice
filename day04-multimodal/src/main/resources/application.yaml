spring:
  application:
    name: day04-multimodal
  ai:
    google:
      genai:
        chat:
          model: gemini-3.1-flash-lite
        api-key: ${GOOGLE_API_KEY}
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  web:
    error:
      include-message: always

logging:
  level:
    org.springframework.ai.chat.client.advisor: DEBUG